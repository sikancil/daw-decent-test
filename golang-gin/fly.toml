# fly.toml app configuration file
# see https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "daw-decent-test"
primary_region = "ams"

[build]
  builtin = "go"

[env]
  PORT = "3000"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  min_machines_running = 2
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
